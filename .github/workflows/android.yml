name: Build Android APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Build Web Project
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Android APK
        run: |
          cd android
          # Cria as pastas e arquivos que o Android está reclamando que faltam
          mkdir -p capacitor-cordova-android-plugins
          echo "// Arquivo gerado automaticamente" > capacitor-cordova-android-plugins/cordova.variables.gradle
          
          # Dá permissão ao executor do Android
          chmod +x gradlew
          
          # Limpa e constrói o APK
          ./gradlew clean
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
